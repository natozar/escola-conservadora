name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Validate HTML
        run: npx html-validate index.html app.html auth.html perfil.html contato.html || true

      - name: Verify lessons integrity
        run: |
          node -e "
            const fs=require('fs');
            const index=JSON.parse(fs.readFileSync('lessons/index.json','utf8'));
            console.log('Index:', index.length, 'modules');
            let ok=true;
            index.forEach((_,i)=>{
              const f='lessons/mod-'+i+'.json';
              if(!fs.existsSync(f)){console.error('MISSING:',f);ok=false}
            });
            if(!ok) process.exit(1);
            console.log('All module files present.');
          "

      - name: Build with Vite
        run: npm run build

      - name: Check bundle sizes
        run: |
          echo "=== Bundle Size Report ==="
          for f in dist/app.js dist/i18n.js dist/supabase-client.js dist/stripe-billing.js dist/cookie-consent.js; do
            if [ -f "$f" ]; then
              SIZE=$(wc -c < "$f")
              echo "$(basename $f): ${SIZE} bytes"
            fi
          done
          CSS=$(find dist -name "*.css" | head -1)
          if [ -n "$CSS" ]; then echo "CSS: $(wc -c < "$CSS") bytes"; fi

      - name: Upload artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
