<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f1729">
<meta name="robots" content="noindex">
<title>Verificar Certificado — Escola Liberal</title>
<link rel="icon" href="assets/icons/favicon.ico" sizes="48x48">
<link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1729;--card:#1a2540;--text:#e8e6e1;--muted:#9ba3b5;--sage:#4a9e7e;--border:rgba(255,255,255,.06)}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.cert-verify{background:var(--card);border:1px solid var(--border);border-radius:16px;max-width:500px;width:100%;padding:2.5rem;text-align:center}
.cert-icon{font-size:3rem;margin-bottom:1rem}
h1{font-family:'DM Serif Display',serif;font-size:1.5rem;margin-bottom:.5rem}
.cert-status{font-size:1rem;margin:.75rem 0;padding:.75rem;border-radius:8px}
.cert-valid{background:rgba(74,158,126,.15);color:#5fbf96;border:1px solid rgba(74,158,126,.3)}
.cert-invalid{background:rgba(224,116,96,.15);color:#e07460;border:1px solid rgba(224,116,96,.3)}
.cert-loading{background:rgba(155,163,181,.1);color:var(--muted)}
.cert-detail{font-size:.9rem;color:var(--muted);margin:.5rem 0;line-height:1.5}
.cert-detail strong{color:var(--text)}
.cert-back{display:inline-block;margin-top:1.5rem;color:var(--sage);text-decoration:none;font-size:.9rem}
.cert-back:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="cert-verify">
  <div class="cert-icon" id="cIcon">🔍</div>
  <h1>Verificar Certificado</h1>
  <div class="cert-status cert-loading" id="cStatus">Verificando...</div>
  <div id="cDetails"></div>
  <a href="index.html" class="cert-back">← Voltar para Escola Liberal</a>
</div>
<script>
(function(){
  var params=new URLSearchParams(location.search);
  var certId=params.get('id');
  var icon=document.getElementById('cIcon');
  var status=document.getElementById('cStatus');
  var details=document.getElementById('cDetails');

  if(!certId){
    icon.textContent='❌';
    status.className='cert-status cert-invalid';
    status.textContent='Nenhum ID de certificado informado.';
    return;
  }

  // Try localStorage first (works offline)
  try{
    var certs=JSON.parse(localStorage.getItem('escola_certs')||'[]');
    var found=certs.find(function(c){return c.hash===certId});
    if(found){
      _showValid(found);
      return;
    }
  }catch(e){}

  // Try Supabase
  var SUPABASE_URL='https://hwjplecfqsckfiwxiedo.supabase.co';
  var SUPABASE_KEY='sb_publishable_-_ZYfPPllImPNCKOA1ZMXQ_zYYM-P6q';
  fetch(SUPABASE_URL+'/rest/v1/certificates?hash=eq.'+encodeURIComponent(certId)+'&select=user_name,discipline,module_index,issued_at',{
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
  }).then(function(r){return r.json()}).then(function(data){
    if(data&&data.length>0){
      _showValid({name:data[0].user_name,discipline:data[0].discipline,date:data[0].issued_at,hash:certId});
    }else{
      icon.textContent='❌';
      status.className='cert-status cert-invalid';
      status.textContent='Certificado nao encontrado.';
      details.innerHTML='<p class="cert-detail">O ID <strong>'+certId+'</strong> nao corresponde a nenhum certificado emitido.</p>';
    }
  }).catch(function(){
    icon.textContent='⚠️';
    status.className='cert-status cert-loading';
    status.textContent='Verificacao indisponivel offline.';
    details.innerHTML='<p class="cert-detail">Conecte-se a internet para verificar este certificado.</p>';
  });

  function _showValid(cert){
    icon.textContent='✅';
    status.className='cert-status cert-valid';
    status.textContent='Certificado Valido';
    var dateStr=cert.date?new Date(cert.date).toLocaleDateString('pt-BR',{day:'numeric',month:'long',year:'numeric'}):'';
    details.innerHTML='<p class="cert-detail"><strong>'+(_esc(cert.name)||'Aluno')+'</strong></p>'
      +'<p class="cert-detail">Disciplina: <strong>'+(cert.discipline||'—')+'</strong></p>'
      +(dateStr?'<p class="cert-detail">Emitido em: <strong>'+dateStr+'</strong></p>':'')
      +'<p class="cert-detail" style="font-size:.75rem;margin-top:.75rem">ID: '+cert.hash+'</p>';
  }
  function _esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML}
})();
</script>
</body>
</html>
